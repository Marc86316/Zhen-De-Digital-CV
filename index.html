<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>振德的個人數位履歷 | Zhen-De Chen CV</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [lang, setLang] = useState('zh');
            
            // 圖標組件 (修正原本 import 無法使用的問題)
            const Icon = ({ name, size = 20, className = "" }) => {
                useEffect(() => {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                }, [name, lang]);
                return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
            };

            const content = {
                zh: {
                    hero: {
                        title: '智慧製造 × AI 應用工程師',
                        subtitle: '結合設備工程、自動化與 AI 分析能力，專注於智慧製造、AOI 與資料驅動流程優化。'
                    },
                    about: {
                        title: '關於我',
                        paragraphs: [
                            '我習慣以系統化方式拆解問題，並透過流程設計與時間管理提升執行效率。',
                            '在思達科技擔任設備工程師期間，我負責設備整合與異常分析，並參與自動化流程設計。目前專注於將機器學習應用於工業場景中。'
                        ]
                    },
                    contact: {
                        email: 'marcuslyleth@gmail.com',
                        phone: '0975-099-958',
                        location: '新竹 / 台中'
                    }
                },
                en: {
                    hero: {
                        title: 'Smart Manufacturing × AI Engineer',
                        subtitle: 'Integrating equipment engineering, automation, and AI analytics to optimize manufacturing processes.'
                    },
                    about: {
                        title: 'About Me',
                        paragraphs: [
                            'I excel at decomposing complex problems and improving execution efficiency through workflow design.',
                            'Previously an Equipment Engineer at STAr Technologies, now focusing on applying Machine Learning to industrial scenarios.'
                        ]
                    },
                    contact: {
                        email: 'marcuslyleth@gmail.com',
                        phone: '0975-099-958',
                        location: 'Hsinchu / Taichung'
                    }
                }
            };

            return (
                <div className="min-h-screen">
                    {/* 導覽列 */}
                    <nav className="fixed top-0 w-full z-50 glass-effect border-b border-gray-200">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                            <span className="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                                ZHEN-DE CHEN
                            </span>
                            <div className="flex gap-4">
                                <button onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')} 
                                        className="flex items-center gap-2 px-3 py-1 rounded-full border border-gray-300 hover:bg-gray-100 transition-colors text-sm">
                                    <Icon name="globe" size={16} />
                                    {lang === 'zh' ? 'English' : '中文'}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero 區塊 */}
                    <header className="pt-32 pb-20 px-6 bg-gradient-to-b from-blue-50 to-white">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className="text-4xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight">
                                {content[lang].hero.title}
                            </h1>
                            <p className="text-lg md:text-xl text-gray-600 mb-10 max-w-2xl mx-auto">
                                {content[lang].hero.subtitle}
                            </p>
                            <div className="flex flex-wrap justify-center gap-4">
                                <a href="mailto:marcuslyleth@gmail.com" className="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition-all shadow-md">
                                    <Icon name="mail" /> {lang === 'zh' ? '聯繫我' : 'Contact Me'}
                                </a>
                                <a href="https://github.com/Marc86316" target="_blank" className="flex items-center gap-2 bg-gray-900 text-white px-6 py-3 rounded-xl hover:bg-black transition-all shadow-md">
                                    <Icon name="github" /> GitHub
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* 關於我 */}
                    <section className="py-20 px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex items-center gap-3 mb-8">
                                <Icon name="user" className="text-blue-600" size={28} />
                                <h2 className="text-2xl font-bold">{content[lang].about.title}</h2>
                            </div>
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                {content[lang].about.paragraphs.map((p, i) => (
                                    <p key={i} className="text-gray-600 mb-4 leading-relaxed text-lg">{p}</p>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 聯絡資訊 */}
                    <footer className="py-20 px-6 bg-gray-900 text-white">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-2xl font-bold mb-10 underline decoration-blue-500 underline-offset-8">Let's Connect</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                <div className="flex flex-col items-center gap-2">
                                    <Icon name="mail" className="text-blue-400" />
                                    <span>{content[lang].contact.email}</span>
                                </div>
                                <div className="flex flex-col items-center gap-2">
                                    <Icon name="phone" className="text-blue-400" />
                                    <span>{content[lang].contact.phone}</span>
                                </div>
                                <div className="flex flex-col items-center gap-2">
                                    <Icon name="map-pin" className="text-blue-400" />
                                    <span>{content[lang].contact.location}</span>
                                </div>
                            </div>
                            <div className="mt-16 text-gray-500 text-sm">
                                © 2026 Zhen-De Chen. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
